<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Search</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            /* Using a high-quality nature gradient/image placeholder */
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), 
                        url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 700px;
            padding: 20px;
            text-align: center;
            animation: fadeIn 1s ease-out;
        }

        h1 {
            color: white;
            font-size: 3.5rem;
            margin-bottom: 40px;
            font-weight: 300;
            letter-spacing: 2px;
            text-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        /* Glassmorphism Search Bar */
        .search-wrapper {
            display: flex;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 10px;
            border-radius: 100px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
        }

        .search-wrapper:focus-within {
            background: rgba(255, 255, 255, 0.25);
            transform: scale(1.02);
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }

        .search-input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            color: white;
        }

        .search-input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        .search-btn {
            background: #ffffff;
            color: #222;
            border: none;
            padding: 15px 35px;
            border-radius: 100px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .search-btn:hover {
            background: #4a90e2;
            color: white;
            transform: translateY(-1px);
        }

        .nav-links {
            margin-top: 30px;
        }

        .nav-links a {
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            margin: 0 15px;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: white;
            text-decoration: underline;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Mobile Adjustments */
        @media (max-width: 600px) {
            h1 { font-size: 2.2rem; }
            .search-wrapper { border-radius: 30px; flex-direction: column; padding: 15px; }
            .search-btn { margin-top: 10px; width: 100%; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>YASIRU</h1>
        
        <form action="C:\yasiru  raveen\webs\NO5.html" class="search-wrapper">
            <input type="text" class="search-input" placeholder="Explore the universe..." autofocus>
            <button type="submit" class="search-btn">Search</button>
        </form>

        <nav class="nav-links">
            <a href="C:\yasiru  raveen\webs\NO7.html">Images</a>
            <a href="#">Videos</a>
            <a href="#">News</a>
            <a href="C:\yasiru  raveen\webs\NO6.html">About</a>
        </nav>
    </div>

</body>
</html>
